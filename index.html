<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PROMO TRACKER v17.7</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --bg-dark: #0c0c0c;
            --panel-bg: #151515;
            --accent-red: #ff3131;
            --accent-green: #00ff88;
            --accent-orange: #ffbd00;
            --accent-blue: #00a3ff;
            --border-color: #2a2a2a;
            --text-main: #ffffff;
            --text-dim: #666;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 10px;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
        }

        .dashboard { max-width: 500px; margin: 0 auto; }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--accent-red);
            padding-bottom: 8px;
        }

        .header-left { display: flex; align-items: center; gap: 10px; }
        .logo-box { background: var(--accent-red); color: black; padding: 2px 8px; border-radius: 3px; font-size: 1.2rem; }
        
        .header-tools { display: flex; gap: 18px; align-items: center; }
        .tool-btn { background: transparent; border: none; cursor: pointer; display: flex; align-items: center; padding: 4px; }
        .tool-btn svg { fill: white; }

        .input-section {
            background: var(--panel-bg);
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }

        .form-row { display: flex; gap: 6px; margin-bottom: 12px; }
        .field-group { flex: 1; display: flex; flex-direction: column; }
        .field-label { font-size: 0.55rem; color: var(--accent-red); margin-bottom: 4px; letter-spacing: 1px; }

        input, select {
            background: #1e1e1e;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 900;
            height: 38px;
            text-transform: uppercase;
        }

        .btn-save { 
            border: 1px solid var(--accent-green); 
            color: var(--accent-green); 
            background: transparent; 
            font-weight: 900; 
            flex: 0.6;
            height: 38px;
            align-self: flex-end;
            cursor: pointer;
        }

        .promo-card { 
            background: var(--panel-bg); 
            border: 1px solid var(--border-color); 
            padding: 12px; 
            margin-bottom: 10px; 
            border-radius: 4px; 
            position: relative;
        }

        .btn-trash {
            position: absolute;
            top: 10px;
            right: 10px;
            background: transparent;
            border: none;
            color: #444;
            cursor: pointer;
            font-size: 1.1rem;
        }

        .timeline-container { 
            height: 10px; 
            background: #0a0a0a; 
            margin: 15px 0 5px 0; 
            border-radius: 2px; 
            overflow: hidden; 
            border: 1px solid #222;
        }

        .timeline-bar { height: 100%; width: 0%; transition: width 0.4s ease-in-out; }
        .date-labels { display: flex; justify-content: space-between; font-size: 0.6rem; color: var(--text-dim); }

        .btn-action { background: transparent; width: 100%; padding: 10px; font-weight: 900; cursor: pointer; margin-top: 10px; text-transform: uppercase; font-size: 0.75rem; border-radius: 4px; border: 1px solid transparent; }
        .btn-pos { border-color: var(--accent-red); color: var(--accent-red); }
        .btn-archive { border-color: var(--accent-blue); color: var(--accent-blue); }

        .archive-header { border-bottom: 1px solid var(--accent-blue); color: var(--accent-blue); margin-top: 25px; margin-bottom: 12px; font-size: 0.8rem; opacity: 0.6; }
        .archive-card { opacity: 0.6; }
    </style>
</head>
<body>

<div class="dashboard">
    <header>
        <div class="header-left"><span class="logo-box">P</span><h1>PROMO TRACKER</h1></div>
        <div class="header-tools">
            <button class="tool-btn" onclick="exportData()">
                <svg width="20" height="20" viewBox="0 0 24 24"><path d="M12 16c-.55 0-1-.45-1-1V4.41L8.71 6.7c-.39.39-1.02.39-1.41 0-.39-.39-.39-1.02 0-1.41L11.3 1.3c.39-.39 1.02-.39 1.41 0l4 4c.39.39.39 1.02 0 1.41-.39.39-1.02.39-1.41 0L13 4.41V15c0 .55-.45 1-1 1zm9 1c0 .55-.45 1-1 1H4c-.55 0-1-.45-1-1s.45-1 1-1h16c.55 0 1 .45 1 1zm0 4c0 .55-.45 1-1 1H4c-.55 0-1-.45-1-1s.45-1 1-1h16c.55 0 1 .45 1 1z"/></svg>
            </button>
            <button class="tool-btn" onclick="document.getElementById('importFile').click()">
                <svg width="20" height="20" viewBox="0 0 24 24"><path d="M11.3 15.7c.39.39 1.02.39 1.41 0l4-4c.39-.39.39-1.02 0-1.41-.39-.39-1.02-.39-1.41 0L13 12.59V2c0-.55-.45-1-1-1s-1 .45-1 1v10.59l-2.29-2.3c-.39-.39-1.02-.39-1.41 0-.39.39-.39 1.02 0 1.41l4 4zM20 18H4c-.55 0-1 .45-1 1s.45 1 1 1h16c.55 0 1-.45 1-1s-.45-1-1-1zm0 4H4c-.55 0-1 .45-1 1s.45 1 1 1h16c.55 0 1-.45 1-1s-.45-1-1-1z"/></svg>
            </button>
            <button class="tool-btn" onclick="sharePDF()">
                <svg width="20" height="20" viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg>
            </button>
        </div>
        <input type="file" id="importFile" style="display:none" onchange="importData(event)">
    </header>

    <div class="input-section">
        <div class="form-row">
            <div class="field-group" style="flex: 1.5;"><label class="field-label">OMSCHRIJVING</label><input type="text" id="p-name" placeholder="..."></div>
            <div class="field-group"><label class="field-label">START</label><input type="date" id="p-start"></div>
            <div class="field-group"><label class="field-label">EINDE</label><input type="date" id="p-end"></div>
        </div>
        <div class="form-row">
            <div class="field-group" style="flex: 2;"><label class="field-label">TYPE ACTIE</label><select id="p-type"><option>CASHBACK</option><option>GRATIS PRODUCT</option><option>KORTING</option></select></div>
            <button class="btn-save" onclick="addPromo()">SAVE</button>
        </div>
    </div>

    <div id="promo-list"></div>
    <div class="archive-header">HISTORY / ARCHIVE</div>
    <div id="archive-list"></div>
</div>

<script>
    const { jsPDF } = window.jspdf;
    let promos = JSON.parse(localStorage.getItem('tact_v17_act')) || [];
    let archive = JSON.parse(localStorage.getItem('tact_v17_arc')) || [];

    function addPromo() {
        const n = document.getElementById('p-name').value;
        const s = document.getElementById('p-start').value;
        const e = document.getElementById('p-end').value;
        if(!n || !s || !e) return;
        promos.push({ id: Date.now(), name: n, type: document.getElementById('p-type').value, start: s, end: e, pos: false });
        save();
        document.getElementById('p-name').value = '';
    }

    function deletePromo(id, isArchive = false) {
        if(confirm('Wissen?')) {
            if(isArchive) archive = archive.filter(x => x.id !== id);
            else promos = promos.filter(x => x.id !== id);
            save();
        }
    }

    function save() {
        localStorage.setItem('tact_v17_act', JSON.stringify(promos));
        localStorage.setItem('tact_v17_arc', JSON.stringify(archive));
        render();
    }

    function render() {
        const container = document.getElementById('promo-list');
        const archContainer = document.getElementById('archive-list');
        const d = new Date();
        const todayMs = new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();

        container.innerHTML = ''; archContainer.innerHTML = '';

        promos.forEach(p => {
            const sDate = p.start.split('-');
            const eDate = p.end.split('-');
            const startMs = new Date(sDate[0], sDate[1]-1, sDate[2]).getTime();
            const endMs = new Date(eDate[0], eDate[1]-1, eDate[2]).getTime();

            let progress = 0;
            if (todayMs >= startMs) {
                const total = endMs - startMs;
                const elapsed = todayMs - startMs;
                progress = total > 0 ? Math.min(100, Math.floor((elapsed / total) * 100)) : 100;
            }
            if (todayMs > endMs) progress = 100;

            const isExpired = todayMs > endMs;
            let barColor = progress < 50 ? 'var(--accent-green)' : (progress < 85 ? 'var(--accent-orange)' : 'var(--accent-red)');

            const card = document.createElement('div');
            card.className = 'promo-card';
            if(p.pos) card.style.opacity = '0.4';
            card.innerHTML = `
                <button class="btn-trash" onclick="deletePromo(${p.id}, false)">🗑️</button>
                <div style="display:flex; justify-content:space-between; margin-right: 35px;">
                    <div><div style="font-size:1rem;">${p.name}</div><div style="color:var(--accent-orange); font-size:0.6rem;">${p.type}</div></div>
                    <div style="color:${isExpired ? 'var(--accent-red)' : 'var(--accent-green)'}; font-size:0.7rem;">${isExpired ? 'EXP' : 'ACT'}</div>
                </div>
                <div class="timeline-container"><div class="timeline-bar" style="width:${progress}%; background-color:${barColor};"></div></div>
                <div class="date-labels"><span>${p.start.split('-').reverse().join('/')}</span><span>${p.end.split('-').reverse().join('/')}</span></div>
                ${isExpired && !p.pos ? `<button class="btn-action btn-pos" onclick="markPos(${p.id})">POS VERWIJDERD</button>` : ''}
                ${p.pos ? `<button class="btn-action btn-archive" onclick="moveToArch(${p.id})">ARCHIVEREN</button>` : ''}
            `;
            container.appendChild(card);
        });

        archive.forEach(a => {
            const card = document.createElement('div');
            card.className = 'promo-card archive-card';
            card.innerHTML = `
                <button class="btn-trash" onclick="deletePromo(${a.id}, true)">🗑️</button>
                <div style="display:flex; justify-content:space-between; margin-right: 35px;">
                    <div><div style="font-size:0.95rem; color:#eee;">${a.name}</div><div style="color:var(--text-dim); font-size:0.6rem;">${a.type}</div></div>
                    <div style="color:var(--accent-blue); font-size:0.7rem;">ARC</div>
                </div>
                <div style="margin-top: 10px; border-top: 1px solid #222; padding-top: 5px;">
                    <div class="date-labels"><span>START: ${a.start.split('-').reverse().join('/')}</span><span>EIND: ${a.end.split('-').reverse().join('/')}</span></div>
                </div>
            `;
            archContainer.appendChild(card);
        });
    }

    function exportData() {
        const data = { active: promos, archive: archive };
        const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `promo_backup.json`;
        a.click();
    }

    function importData(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            try {
                const imported = JSON.parse(ev.target.result);
                // Universele check: herken zowel directe arrays als het object-formaat
                if (imported.active || imported.archive) {
                    promos = imported.active || [];
                    archive = imported.archive || [];
                } else if (Array.isArray(imported)) {
                    promos = imported;
                }
                save();
                alert('Import geslaagd!');
            } catch (err) {
                alert('Fout: Bestand niet leesbaar.');
            }
        };
        reader.readAsText(e.target.files[0]);
    }

    window.markPos = (id) => { const p = promos.find(x => x.id === id); if(p) p.pos = true; save(); };
    window.moveToArch = (id) => {
        const i = promos.findIndex(x => x.id === id);
        if(i > -1) { archive.unshift(promos[i]); promos.splice(i, 1); save(); }
    };

    async function sharePDF() {
        const doc = new jsPDF();
        doc.text("PROMO REPORT", 10, 10);
        promos.forEach((p, i) => doc.text(`${p.name} (${p.start} - ${p.end})`, 10, 20 + (i * 10)));
        doc.save("report.pdf");
    }

    render();
</script>

</body>
</html>
