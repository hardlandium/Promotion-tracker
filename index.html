<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PROMO TRACKER V44.1</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --bg: #000000;
            --panel-bg: #0a0a0a;
            --panel-inner: #000000;
            --accent-red: #ff3b30;
            --accent-orange: #ff9500;
            --accent-green: #4cd964;
            --accent-blue: #00a3ff;
            --border: #1c1c1e;
            --text-main: #ffffff;
            --text-dim: #888;
        }

        * { box-sizing: border-box; font-family: 'Arial Black', sans-serif; text-transform: uppercase; margin: 0; padding: 0; }
        body { background-color: var(--bg); color: var(--text-main); padding: 8px; font-size: 11px; overflow-x: hidden; }
        .container { max-width: 100%; margin: 0 auto; }

        header { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); margin-bottom: 10px; }
        .header-left { display: flex; align-items: center; gap: 8px; }
        .logo-sq { background: var(--accent-red); color: white; padding: 4px 10px; font-weight: 900; font-size: 16px; border-radius: 4px; }
        h1 { font-size: 13px; font-style: italic; letter-spacing: 1px; }

        .admin-controls { display: flex; gap: 4px; }
        .ctrl-btn { background: var(--panel-bg); border: 1px solid #222; width: 38px; height: 38px; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .ctrl-btn svg { width: 18px; height: 18px; }
        .btn-share svg { fill: var(--accent-blue); }
        .btn-backup svg { fill: var(--text-dim); }

        .input-panel { background: var(--panel-bg); border: 1px solid var(--border); padding: 8px; border-radius: 10px; margin-bottom: 10px; }
        .modality-selector { display: flex; gap: 4px; margin-bottom: 8px; }
        .mod-btn { flex: 1; background: var(--panel-inner); border: 1px solid var(--border); color: var(--text-dim); padding: 8px 2px; font-size: 8px; cursor: pointer; border-radius: 4px; }
        .mod-btn.active { border-color: var(--accent-orange); color: var(--accent-orange); background: rgba(255, 149, 0, 0.1); }

        .input-row { display: flex; gap: 4px; align-items: center; }
        input[type="text"] { flex: 1; min-width: 0; background: var(--panel-inner); border: 1px solid var(--border); color: var(--text-main); padding: 10px; font-size: 12px; border-radius: 6px; outline: none; }
        
        .icon-box { position: relative; width: 38px; height: 38px; background: var(--panel-inner); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; border-radius: 6px; flex-shrink: 0; }
        .icon-box input { position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer; z-index: 2; }
        .icon-box svg { width: 18px; height: 18px; }
        
        .save-btn { width: 45px; height: 38px; background: #1c1c1e; border: 1px solid #333; color: var(--accent-green); font-weight: 900; border-radius: 6px; cursor: pointer; font-size: 9px; flex-shrink: 0; }

        /* REWORKED HORIZONTAL COMPACT CARD */
        .card { 
            background: var(--panel-bg); 
            margin-bottom: 6px; 
            padding: 10px; 
            border-radius: 8px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .card-row-top { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-end; 
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 4px;
        }

        .card-dates-compact { display: flex; gap: 8px; font-size: 12px; align-items: center; }
        .card-dates-compact .d-val { font-weight: 900; letter-spacing: 0.5px; }
        
        .status-badge { font-size: 11px; font-weight: 900; font-style: italic; letter-spacing: 0.5px; }

        .card-row-bottom { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        .p-title-compact { 
            font-size: 15px; 
            color: #fff; 
            font-style: italic; 
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-right: 15px;
        }

        .card-actions-compact { display: flex; gap: 15px; align-items: center; flex-shrink: 0; }
        .act-btn-sm { background: none; border: none; display: flex; align-items: center; cursor: pointer; }
        .act-btn-sm svg { width: 18px; height: 18px; }

        .mod-label { font-size: 7px; color: var(--text-dim); margin-left: 4px; border: 1px solid #222; padding: 1px 4px; border-radius: 3px; }

        #importFile { display: none; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="header-left"><div class="logo-sq">P</div><h1>TRACKER</h1></div>
        <div class="admin-controls">
            <div class="ctrl-btn btn-share" onclick="sharePDF()"><svg viewBox="0 0 24 24"><path d="M18,16.08C17.24,16.08 16.56,16.38 16.04,16.85L8.91,12.7C8.96,12.47 9,12.24 9,12C9,11.76 8.96,11.53 8.91,11.3L15.96,7.19C16.5,7.69 17.21,8 18,8A3,3 0 0,0 21,5A3,3 0 0,0 18,2A3,3 0 0,0 15,5C15,5.24 15.04,5.47 15.09,5.7L8.04,9.81C7.5,9.31 6.79,9 6,9A3,3 0 0,0 3,12A3,3 0 0,0 6,15C6.79,15 7.5,14.69 8.04,14.19L15.16,18.34C15.11,18.55 15.08,18.77 15.08,19C15.08,20.61 16.39,21.91 18,21.91C19.61,21.91 20.92,20.61 20.92,19A2.92,2.92 0 0,0 18,16.08Z"/></svg></div>
            <div class="ctrl-btn btn-backup" onclick="exportCSV()"><svg viewBox="0 0 24 24"><path d="M5,20H19V18H5M19,9H15V3H9V9H5L12,16L19,9Z"/></svg></div>
            <div class="ctrl-btn btn-backup" onclick="triggerImport()"><svg viewBox="0 0 24 24"><path d="M9,16V10H5L12,3L19,10H15V16H9M5,20V18H19V20H5Z"/></svg></div>
        </div>
    </header>

    <div class="input-panel">
        <div class="modality-selector">
            <div class="mod-btn active" data-mod="CASHBACK" onclick="setMod(this, 'CASHBACK')">CASHBACK</div>
            <div class="mod-btn" data-mod="BUNDLE" onclick="setMod(this, 'BUNDLE')">BUNDLE</div>
            <div class="mod-btn" data-mod="DISCOUNT" onclick="setMod(this, 'DISCOUNT')">DISCOUNT</div>
        </div>
        <div class="input-row">
            <input type="text" id="name" placeholder="PROMOTION NAME">
            <div class="icon-box"><svg viewBox="0 0 24 24" style="fill:var(--accent-green)"><path d="M19,4H18V2H16V4H8V2H6V4H5C3.89,4 3,4.9 3,6V20A2,2 0 0,0 5,22H19A2,2 0 0,0 21,20V6A2,2 0 0,0 19,4M19,20H5V10H19V20M19,8H5V6H19V8M7,12H12V17H7V12Z"/></svg><input type="date" id="start"></div>
            <div class="icon-box"><svg viewBox="0 0 24 24" style="fill:var(--accent-red)"><path d="M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M12,4A8,8 0 0,1 20,12A8,8 0 0,1 12,20A8,8 0 0,1 4,12A8,8 0 0,1 12,4M12,6V12L16,14.5L16.7,13.2L13.5,11.3V6H12Z"/></svg><input type="date" id="end"></div>
            <button class="save-btn" id="save-action-btn" onclick="handleAction()">ADD</button>
        </div>
    </div>
    
    <input type="file" id="importFile" accept=".csv" onchange="importCSV(event)">
    <div id="list"></div>
</div>

<script>
    let promos = JSON.parse(localStorage.getItem('p_v36_final')) || [];
    let currentMod = 'CASHBACK';
    let editId = null;

    function setMod(btn, mod) {
        if(!btn) return;
        document.querySelectorAll('.mod-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentMod = mod;
    }

    function handleAction() {
        const n = document.getElementById('name'), s = document.getElementById('start'), e = document.getElementById('end');
        if(!n.value || !s.value || !e.value) return;
        if(editId !== null) {
            const idx = promos.findIndex(p => p.id == editId);
            if(idx !== -1) promos[idx] = { ...promos[idx], name: n.value, start: s.value, end: e.value, mod: currentMod };
            editId = null; document.getElementById('save-action-btn').innerText = 'ADD';
        } else {
            promos.push({ id: Date.now(), name: n.value, start: s.value, end: e.value, mod: currentMod });
        }
        saveAndRender();
        n.value = ''; s.value = ''; e.value = '';
    }

    function saveAndRender() { localStorage.setItem('p_v36_final', JSON.stringify(promos)); render(); }

    function getStatusInfo(startStr, endStr) {
        const now = new Date(); now.setHours(0,0,0,0);
        const dS = new Date(startStr); dS.setHours(0,0,0,0);
        const dE = new Date(endStr); dE.setHours(0,0,0,0);
        const daysLeft = Math.round((dE - now) / (1000 * 60 * 60 * 24));
        if (now < dS) return { text: "UPCOMING", color: '#00a3ff' };
        if (now > dE) return { text: "EXPIRED", color: '#444' };
        if (daysLeft === 0) return { text: "LAST CHANCE", color: '#ff3b30' };
        if (daysLeft === 1) return { text: "ENDS MORROW", color: '#ff3b30' };
        if (daysLeft <= 3) return { text: "EXPIRING SOON", color: '#ff9500' };
        return { text: "ACTIVE", color: '#4cd964' };
    }

    function render() {
        const container = document.getElementById('list');
        container.innerHTML = '';
        promos.sort((a,b) => new Date(a.end) - new Date(b.end));
        promos.forEach(p => {
            const status = getStatusInfo(p.start, p.end);
            const card = document.createElement('div');
            card.className = 'card';
            card.style.borderLeft = `4px solid ${status.color}`;
            const sDate = p.start.split('-').reverse().slice(0,2).join('/');
            const eDate = p.end.split('-').reverse().slice(0,2).join('/');
            
            card.innerHTML = `
                <div class="card-row-top">
                    <div class="card-dates-compact">
                        <span class="d-val" style="color:var(--text-dim); opacity:0.8;">${sDate}</span>
                        <span style="opacity:0.2;">></span>
                        <span class="d-val" style="color:${status.color}">${eDate}</span>
                        <span class="mod-label">${p.mod}</span>
                    </div>
                    <div class="status-badge" style="color:${status.color}">${status.text}</div>
                </div>
                <div class="card-row-bottom">
                    <div class="p-title-compact">${p.name}</div>
                    <div class="card-actions-compact">
                        <div class="act-btn-sm" onclick="editPromo(${p.id})"><svg viewBox="0 0 24 24" style="fill:var(--text-dim)"><path d="M20.71,7.04C21.1,6.65 21.1,6 20.71,5.63L18.37,3.29C18,2.9 17.35,2.9 16.96,3.29L15.12,5.12L18.87,8.87M3,17.25V21H6.75L17.81,9.93L14.07,6.19L3,17.25Z"/></svg></div>
                        <div class="act-btn-sm" onclick="del(${p.id})"><svg viewBox="0 0 24 24" style="fill:var(--accent-red); opacity:0.8;"><path d="M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41Z"/></svg></div>
                    </div>
                </div>`;
            container.appendChild(card);
        });
    }

    function editPromo(id) {
        const p = promos.find(x => x.id == id);
        if(!p) return;
        editId = p.id;
        document.getElementById('name').value = p.name;
        document.getElementById('start').value = p.start;
        document.getElementById('end').value = p.end;
        setMod(document.querySelector(`[data-mod="${p.mod}"]`), p.mod);
        document.getElementById('save-action-btn').innerText = 'SAVE';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function del(id) { if(confirm('DELETE?')) { promos = promos.filter(x => x.id != id); saveAndRender(); } }
    
    function exportCSV() {
        if(promos.length === 0) return;
        let csv = "ID,NAME,START,END,MODALITY\n";
        promos.forEach(p => { csv += `${p.id},${p.name},${p.start},${p.end},${p.mod}\n`; });
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `PROMO_BACKUP_${new Date().toISOString().split('T')[0]}.csv`;
        a.click();
    }

    function triggerImport() { document.getElementById('importFile').click(); }
    
    function importCSV(e) {
        const reader = new FileReader();
        reader.onload = function(ev) {
            const lines = ev.target.result.split('\n');
            const newPromos = [];
            for(let i = 1; i < lines.length; i++) {
                const parts = lines[i].split(',');
                if(parts.length >= 5) { newPromos.push({ id: parts[0].trim(), name: parts[1].trim(), start: parts[2].trim(), end: parts[3].trim(), mod: parts[4].trim() }); }
            }
            if(newPromos.length > 0 && confirm(`Import ${newPromos.length} promos?`)) { promos = newPromos; saveAndRender(); }
        };
        reader.readAsText(e.target.files[0]);
    }

    async function sharePDF() {
        if(promos.length === 0) return;
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFillColor(0, 0, 0); doc.rect(0, 0, 210, 297, 'F');
        doc.setTextColor(255, 59, 48); doc.setFontSize(24); doc.setFont("helvetica", "bold");
        doc.text("PROMOTION REPORT", 15, 25);
        let y = 45;
        promos.forEach(p => {
            const status = getStatusInfo(p.start, p.end);
            if(y > 270) { doc.addPage(); doc.setFillColor(0,0,0); doc.rect(0,0,210,297,'F'); y = 20; }
            doc.setDrawColor(status.color); doc.line(15, y, 15, y + 10);
            doc.setTextColor(255, 255, 255); doc.setFontSize(12); doc.text(p.name, 20, y + 5);
            doc.setFontSize(8); doc.setTextColor(136, 136, 136);
            doc.text(`${p.mod} | ${p.start.split('-').reverse().join('/')} > ${p.end.split('-').reverse().join('/')} | ${status.text}`, 20, y + 10);
            y += 18;
        });
        const pdfBlob = doc.output('blob');
        const fileName = `Promo_Report.pdf`;
        if (navigator.share && navigator.canShare && navigator.canShare({ files: [new File([pdfBlob], fileName, { type: 'application/pdf' })] })) {
            const file = new File([pdfBlob], fileName, { type: 'application/pdf' });
            try { await navigator.share({ files: [file], title: 'Promotion Report' }); } catch (err) { doc.save(fileName); }
        } else { doc.save(fileName); }
    }
    
    render();
    setInterval(render, 60000);
</script>
</body>
</html>
