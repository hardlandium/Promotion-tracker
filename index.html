<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PROMO TRACKER V53.5</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg: #000000;
            --panel-bg: #0a0a0a;
            --panel-inner: #000000;
            --accent-red: #ff3b30;
            --accent-orange: #ff9500;
            --accent-green: #4cd964;
            --accent-blue: #00a3ff;
            --accent-purple: #af52de;
            --border: #1c1c1e;
            --text-main: #ffffff;
            --text-dim: #999;
        }

        * { box-sizing: border-box; font-family: 'Arial Black', sans-serif; text-transform: uppercase; margin: 0; padding: 0; }
        body { background-color: var(--bg); color: var(--text-main); padding: 8px; font-size: 11px; overflow-x: hidden; }
        .container { max-width: 100%; margin: 0 auto; }

        header { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); margin-bottom: 10px; }
        .logo-sq { background: var(--accent-red); color: white; padding: 4px 10px; font-weight: 900; font-size: 16px; border-radius: 4px; }
        h1 { font-size: 13px; font-style: italic; letter-spacing: 1px; }

        .admin-controls { display: flex; gap: 6px; }
        .ctrl-btn { background: var(--panel-bg); border: 1px solid #222; width: 38px; height: 38px; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        .input-panel { background: var(--panel-bg); border: 1px solid var(--border); padding: 8px; border-radius: 10px; margin-bottom: 10px; }
        .modality-selector { display: flex; gap: 6px; margin-bottom: 12px; }
        .mod-btn { flex: 1; background: var(--panel-inner); border: 1px solid #1c1c1e; padding: 10px 2px; font-size: 8px; cursor: pointer; border-radius: 6px; font-weight: 900; text-align: center; }
        .mod-btn.active[data-mod="CASHBACK"] { border-color: var(--accent-blue); color: #fff; }
        .mod-btn.active[data-mod="BUNDLE"] { border-color: var(--accent-orange); color: #fff; }
        .mod-btn.active[data-mod="DISCOUNT"] { border-color: var(--accent-purple); color: #fff; }

        .input-row { display: flex; gap: 4px; margin-bottom: 4px; align-items: center; }
        input, select { background: var(--panel-inner); border: 1px solid var(--border); color: var(--text-main); border-radius: 6px; padding: 10px; font-size: 12px; outline: none; }
        
        .filter-container { margin-bottom: 12px; }
        .filter-scroll-wrapper { display: flex; overflow-x: auto; gap: 4px; padding: 4px 0; justify-content: flex-start; scrollbar-width: none; }
        .filter-chip { flex: 0 0 auto; background: var(--panel-inner); border: 1px solid #1c1c1e; color: #444; padding: 8px 14px; border-radius: 20px; font-size: 9px; font-weight: 900; cursor: pointer; }
        .filter-chip.active { border-color: var(--accent-blue); color: #fff; }

        .card { background: var(--panel-bg); margin-bottom: 8px; padding: 12px; border-radius: 10px; border: 1px solid var(--border); border-left: 4px solid #333; }
        .card-row-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .p-title-compact { font-size: 12px; color: #fff; font-weight: 900; line-height: 1.2; flex: 1; cursor: pointer; }
        
        .date-container { background: #000; border: 1px solid #1c1c1e; padding: 6px 10px; border-radius: 6px; margin-bottom: 10px; display: inline-flex; align-items: center; gap: 8px; }
        .date-text { font-size: 11px; font-weight: 900; color: #fff; }

        .meta-row { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #1a1a1a; padding-top: 8px; }
        .tag-container { display: flex; gap: 4px; align-items: center; }
        .tag { font-size: 8px; padding: 3px 8px; border-radius: 4px; font-weight: 900; background: #000; border: 1px solid #333; }
        .card-actions { display: flex; gap: 15px; align-items: center; }

        .icon-box { position: relative; width: 38px; height: 38px; background: var(--panel-inner); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; border-radius: 6px; }
        .icon-box input { position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer; z-index: 2; }
        .save-btn { width: 50px; height: 38px; background: #1c1c1e; border: 1px solid #333; color: var(--accent-green); font-weight: 900; border-radius: 6px; }

        #qr-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        #qr-container { background: #fff; padding: 20px; border-radius: 12px; }
        #qr-pdf-gen { position: absolute; left: -9999px; }
    </style>
</head>
<body>

<div id="qr-overlay">
    <div id="qr-title" style="margin-bottom:20px; font-size:18px; text-align:center;"></div>
    <div id="qr-container"></div>
    <div onclick="closeQR()" style="margin-top:30px; background:var(--accent-red); padding:15px 40px; border-radius:30px; font-weight:900; cursor:pointer;">CLOSE</div>
</div>

<div id="qr-pdf-gen"></div>

<div class="container">
    <header>
        <div style="display:flex; align-items:center; gap:8px;"><div class="logo-sq">P</div><h1>TRACKER</h1></div>
        <div class="admin-controls">
            <div class="ctrl-btn" onclick="handleFullShare()" style="border-color: var(--accent-blue);"><svg viewBox="0 0 24 24" style="fill:var(--accent-blue); width:20px;"><path d="M18,16.08C17.24,16.08 16.56,16.38 16.04,16.85L8.91,12.7C8.96,12.47 9,12.24 9,12C9,11.76 8.96,11.53 8.91,11.3L15.96,7.19C16.5,7.69 17.21,8 18,8A3,3 0 0,0 21,5A3,3 0 0,0 18,2A3,3 0 0,0 15,5C15,5.24 15.04,5.47 15.09,5.7L8.04,9.81C7.5,9.31 6.79,9 6,9A3,3 0 0,0 3,12A3,3 0 0,0 6,15C6.79,15 7.5,14.69 8.04,14.19L15.16,18.34C15.11,18.55 15.08,18.77 15.08,19C15.08,20.61 16.39,21.91 18,21.91C19.61,21.91 20.92,20.61 20.92,19A2.92,2.92 0 0,0 18,16.08Z"/></svg></div>
            <div class="ctrl-btn" onclick="exportCSV()"><svg style="fill:var(--text-dim)" viewBox="0 0 24 24"><path d="M5,20H19V18H5M19,9H15V3H9V9H5L12,16L19,9Z"/></svg></div>
            <div class="ctrl-btn" onclick="document.getElementById('importFile').click()"><svg style="fill:var(--accent-green)" viewBox="0 0 24 24"><path d="M9,16V10H5L12,3L19,10H15V16H9M5,20V18H19V20H5Z"/></svg></div>
        </div>
    </header>

    <div class="input-panel">
        <div class="modality-selector">
            <div class="mod-btn" data-mod="CASHBACK" onclick="toggleMod(this, 'CASHBACK')">CASHBACK</div>
            <div class="mod-btn" data-mod="BUNDLE" onclick="toggleMod(this, 'BUNDLE')">BUNDLE</div>
            <div class="mod-btn" data-mod="DISCOUNT" onclick="toggleMod(this, 'DISCOUNT')">DISCOUNT</div>
        </div>
        <div class="input-row">
            <input type="text" id="name" style="flex:2" placeholder="PROMO NAME">
            <select id="dept">
                <option value="MDA">MDA</option><option value="SDA">SDA</option>
                <option value="TELCO">TELCO</option><option value="IT">IT</option>
                <option value="TV">TV</option><option value="HIFI">HIFI</option>
            </select>
        </div>
        <div class="input-row">
            <input type="text" id="url" style="flex:1" placeholder="URL (OPTIONAL)">
            <div class="icon-box"><svg viewBox="0 0 24 24" style="width:18px; fill:var(--accent-green)"><path d="M19,4H18V2H16V4H8V2H6V4H5C3.89,4 3,4.9 3,6V20A2,2 0 0,0 5,22H19A2,2 0 0,0 21,20V6A2,2 0 0,0 19,4M19,20H5V10H19V20M19,8H5V6H19V8M7,12H12V17H7V12Z"/></svg><input type="date" id="start"></div>
            <div class="icon-box"><svg viewBox="0 0 24 24" style="width:18px; fill:var(--accent-red)"><path d="M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M12,4A8,8 0 0,1 20,12A8,8 0 0,1 12,20A8,8 0 0,1 4,12A8,8 0 0,1 12,4M12,6V12L16,14.5L16.7,13.2L13.5,11.3V6H12Z"/></svg><input type="date" id="end"></div>
            <button class="save-btn" id="save-action-btn" onclick="handleAction()">ADD</button>
        </div>
    </div>

    <div class="filter-container">
        <div class="filter-scroll-wrapper" id="dept-filters">
            <div class="filter-chip active" onclick="setFilter('MDA', this)">MDA</div>
            <div class="filter-chip" onclick="setFilter('SDA', this)">SDA</div>
            <div class="filter-chip" onclick="setFilter('TELCO', this)">TELCO</div>
            <div class="filter-chip" onclick="setFilter('IT', this)">IT</div>
            <div class="filter-chip" onclick="setFilter('TV', this)">TV</div>
            <div class="filter-chip" onclick="setFilter('HIFI', this)">HIFI</div>
        </div>
    </div>

    <div id="list"></div>
    <input type="file" id="importFile" accept=".csv" style="display:none;" onchange="importCSV(event)">
</div>

<script>
    let promos = JSON.parse(localStorage.getItem('p_v36_final')) || [];
    let selectedMods = [];
    let editId = null;
    let currentDeptFilter = 'MDA';

    const COLORS = { 
        ACTIVE: [76, 217, 100], UPCOMING: [0, 163, 255], 
        EXPIRED: [68, 68, 68], EXPIRING: [255, 59, 48], 
        TAGS: { CASHBACK: [0, 163, 255], BUNDLE: [255, 149, 0], DISCOUNT: [175, 82, 222] } 
    };

    function setFilter(dept, el) {
        currentDeptFilter = dept;
        document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        render();
    }

    function getStatusData(start, end) {
        const now = new Date().setHours(0,0,0,0);
        const dS = new Date(start).setHours(0,0,0,0);
        const dE = new Date(end).setHours(0,0,0,0);
        if (now < dS) return { text: "UPCOMING", color: COLORS.UPCOMING };
        if (now > dE) return { text: "EXPIRED", color: COLORS.EXPIRED };
        if ((dE - now) <= 259200000) return { text: "EXPIRING", color: COLORS.EXPIRING };
        return { text: "ACTIVE", color: COLORS.ACTIVE };
    }

    function render() {
        const container = document.getElementById('list');
        container.innerHTML = '';
        promos.filter(p => (p.dept === currentDeptFilter || (p.dept === 'TELECOM' && currentDeptFilter === 'TELCO')))
        .sort((a,b) => new Date(a.end) - new Date(b.end))
        .forEach(p => {
            const stat = getStatusData(p.start, p.end);
            const card = document.createElement('div');
            card.className = 'card'; card.style.borderLeftColor = `rgb(${stat.color.join(',')})`;
            card.innerHTML = `
                <div class="card-row-top">
                    <div class="p-title-compact" onclick="showQR('${p.name}', '${p.url||''}')">${p.name}</div>
                    <div style="color:rgb(${stat.color.join(',')}); font-size: 8px; font-weight:900;">${stat.text}</div>
                </div>
                <div class="date-container">
                    <span class="date-text">${p.start.split('-').reverse().slice(0,2).join('/')}</span>
                    <span style="color:#444; font-size:9px;">➤</span>
                    <span class="date-text" style="color:rgb(${stat.color.join(',')})">${p.end.split('-').reverse().slice(0,2).join('/')}</span>
                </div>
                <div class="meta-row">
                    <div class="tag-container">
                        <span class="tag" style="border-color:#444; color:#fff;">${p.dept === 'TELECOM' ? 'TELCO' : p.dept}</span>
                        ${p.mods.map(m => `<span class="tag" style="border-color:rgb(${COLORS.TAGS[m].join(',')}); color:rgb(${COLORS.TAGS[m].join(',')})">${m}</span>`).join('')}
                    </div>
                    <div class="card-actions">
                        <div onclick="editPromo(${p.id})"><svg viewBox="0 0 24 24" style="width:14px; fill:var(--text-dim)"><path d="M3,17.25V21H6.75L17.81,9.93L14.07,6.19L3,17.25Z"/></svg></div>
                        <div onclick="del(${p.id})"><svg viewBox="0 0 24 24" style="width:14px; fill:var(--accent-red)"><path d="M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41Z"/></svg></div>
                    </div>
                </div>`;
            container.appendChild(card);
        });
    }

    async function handleFullShare() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const qrHidden = document.getElementById('qr-pdf-gen');
        doc.setFillColor(0, 0, 0); doc.rect(0, 0, 210, 297, 'F');
        doc.setTextColor(255, 255, 255); doc.setFontSize(14); doc.setFont("helvetica", "bold");
        doc.text(`PROMO REPORT: ${currentDeptFilter}`, 20, 20);
        
        let y = 35;
        const list = promos.filter(p => (p.dept === currentDeptFilter || (p.dept === 'TELECOM' && currentDeptFilter === 'TELCO')));
        for (const p of list) {
            if (y > 260) { doc.addPage(); doc.setFillColor(0,0,0); doc.rect(0,0,210,297,'F'); y = 20; }
            const stat = getStatusData(p.start, p.end);
            doc.setFillColor(stat.color[0], stat.color[1], stat.color[2]); doc.rect(15, y, 2, 28, 'F');
            doc.setTextColor(255, 255, 255); doc.setFontSize(12); doc.text(p.name, 22, y + 6);
            doc.setFontSize(10); doc.text(`${p.start.split('-').reverse().join('/')} TOT ${p.end.split('-').reverse().join('/')}`, 22, y + 14);
            let tx = 22; doc.setFontSize(8);
            p.mods.forEach(m => {
                if(COLORS.TAGS[m]) {
                   const c = COLORS.TAGS[m]; doc.setTextColor(c[0], c[1], c[2]);
                   doc.text(`[ ${m} ]`, tx, y + 22); tx += 30;
                }
            });

            if (p.url) {
                qrHidden.innerHTML = ""; new QRCode(qrHidden, { text: p.url, width: 128, height: 128 });
                await new Promise(r => setTimeout(r, 60));
                const canvas = qrHidden.querySelector('canvas');
                if (canvas) {
                    doc.setFillColor(255,255,255); doc.roundedRect(174, y-1, 22, 22, 1, 1, 'F');
                    doc.addImage(canvas.toDataURL("image/png"), 'PNG', 175, y, 20, 20);
                }
            }
            y += 35; doc.setDrawColor(40, 40, 40); doc.line(20, y - 5, 195, y - 5);
        }
        
        const blob = doc.output('blob');
        const fileName = "Promo_Report.pdf";
        
        if (navigator.canShare && navigator.canShare({ files: [new File([blob], fileName, { type: "application/pdf" })] })) {
            const file = new File([blob], fileName, { type: "application/pdf" });
            try {
                await navigator.share({
                    files: [file],
                    title: 'Promo Report',
                });
            } catch (err) {
                doc.save(fileName);
            }
        } else {
            doc.save(fileName);
        }
    }

    function showQR(n, u) { 
        if(!u || u.length < 5) return; 
        document.getElementById('qr-title').innerText = n; 
        document.getElementById('qr-container').innerHTML = ""; 
        new QRCode(document.getElementById('qr-container'), u); 
        document.getElementById('qr-overlay').style.display='flex'; 
    }
    function closeQR() { document.getElementById('qr-overlay').style.display='none'; }

    function toggleMod(btn, mod) {
        if(selectedMods.includes(mod)) selectedMods = selectedMods.filter(m => m !== mod);
        else selectedMods.push(mod);
        btn.classList.toggle('active');
    }

    function handleAction() {
        const n = document.getElementById('name'), s = document.getElementById('start'), e = document.getElementById('end'), u = document.getElementById('url'), d = document.getElementById('dept');
        if(!n.value || !s.value || !e.value) return;
        const data = { name: n.value, url: u.value, start: s.value, end: e.value, mods: [...selectedMods], dept: d.value };
        if(editId) { promos = promos.map(x => x.id == editId ? { ...x, ...data } : x); editId = null; document.getElementById('save-action-btn').innerText = 'ADD'; } 
        else { promos.push({ id: Date.now(), ...data }); }
        n.value = s.value = e.value = u.value = ''; selectedMods = []; 
        document.querySelectorAll('.mod-btn').forEach(b => b.classList.remove('active'));
        save();
    }

    function editPromo(id) {
        const p = promos.find(x => x.id == id); editId = p.id;
        document.getElementById('name').value = p.name; document.getElementById('start').value = p.start;
        document.getElementById('end').value = p.end; document.getElementById('url').value = p.url || '';
        document.getElementById('dept').value = (p.dept === 'TELECOM') ? 'TELCO' : p.dept;
        selectedMods = [...p.mods];
        document.querySelectorAll('.mod-btn').forEach(b => b.classList.toggle('active', selectedMods.includes(b.dataset.mod)));
        document.getElementById('save-action-btn').innerText = 'SAVE';
        window.scrollTo(0,0);
    }

    function save() { 
        promos = promos.map(p => ({...p, dept: p.dept === 'TELECOM' ? 'TELCO' : p.dept}));
        localStorage.setItem('p_v36_final', JSON.stringify(promos)); 
        render(); 
    }
    function del(id) { if(confirm('DELETE?')) { promos = promos.filter(x => x.id != id); save(); } }
    
    function exportCSV() {
        let csv = "ID,NAME,URL,START,END,MODS,DEPT\n";
        promos.forEach(p => csv += `${p.id},${p.name},${p.url},${p.start},${p.end},${p.mods.join('|')},${p.dept}\n`);
        const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
        a.download = 'promos.csv'; a.click();
    }
    
    function importCSV(e) {
        const file = e.target.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = function(ev) {
            const lines = ev.target.result.split('\n');
            const newPromos = [];
            for(let i = 1; i < lines.length; i++) {
                if(!lines[i].trim()) continue;
                const p = lines[i].split(',');
                let dept = p[6];
                if(dept === 'TELECOM') dept = 'TELCO';
                newPromos.push({ id: p[0], name: p[1], url: p[2], start: p[3], end: p[4], mods: p[5].split('|'), dept: dept });
            }
            promos = newPromos; save();
        };
        reader.readAsText(file);
    }
    render();
</script>
</body>
</html>
