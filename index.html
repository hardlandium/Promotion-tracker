<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PROMO_CORE_v22</title>
    <style>
        :root {
            --bg: #050505;
            --panel: #0d0d0d;
            --neon-red: #ff0000;
            --neon-green: #00ff88;
            --border: #1a1a1a;
            --text: #ffffff;
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; text-transform: uppercase; }

        body {
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            font-weight: 900;
            letter-spacing: 1px;
        }

        .container { max-width: 480px; margin: 0 auto; }

        header {
            border-left: 4px solid var(--neon-red);
            padding: 10px 15px;
            margin-bottom: 30px;
            background: linear-gradient(90deg, #110000 0%, transparent 100%);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 { font-size: 0.8rem; margin: 0; font-style: italic; opacity: 0.8; }

        /* INPUT GRID */
        .input-box { display: grid; gap: 15px; margin-bottom: 30px; }

        .top-row {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .desc-field { flex: 2; border-bottom: 1px solid var(--border); }
        .desc-field input { 
            background: transparent; border: none; color: #fff; 
            padding: 10px 0; font-size: 11px; width: 100%; outline: none; 
            font-weight: 900;
        }

        /* CALENDAR ICON ONLY LOGIC */
        .icon-date-input {
            position: relative;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--panel);
            border: 1px solid var(--border);
            cursor: pointer;
        }

        .icon-date-input span { font-size: 18px; }

        /* De truc: de input is onzichtbaar maar dekt het hele icoon */
        .icon-date-input input[type="date"] {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .bottom-row {
            display: grid;
            grid-template-columns: 1fr 100px;
            gap: 15px;
        }

        select {
            background: transparent; border: none; border-bottom: 1px solid var(--border);
            color: #fff; padding: 10px 0; font-size: 10px; font-weight: 900; outline: none;
        }

        .save-btn {
            background: var(--neon-green);
            color: #000; border: none; font-size: 10px; font-weight: 900;
            cursor: pointer; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
        }

        /* CARDS */
        .card {
            background: var(--panel); border: 1px solid var(--border);
            padding: 15px; margin-bottom: 12px; position: relative;
            border-left: 2px solid var(--neon-red);
        }

        .p-title { font-size: 0.9rem; margin-bottom: 4px; color: #eee; }
        .p-meta { font-size: 8px; color: #444; }

        .progress-track { height: 2px; background: #000; margin: 15px 0 8px 0; overflow: hidden; }
        .progress-fill { height: 100%; transition: 0.8s ease-out; }

        .date-footer { display: flex; justify-content: space-between; font-size: 8px; color: #333; }
        .del-x { position: absolute; top: 10px; right: 10px; cursor: pointer; color: #222; font-size: 16px; }

    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>PROMO_TACT_v22</h1>
        <div style="font-size: 8px; color: var(--neon-red);">[ACTIVE_LINK]</div>
    </header>

    <div class="input-box">
        <div class="top-row">
            <div class="desc-field">
                <input type="text" id="name" placeholder="OMSCHRIJVING">
            </div>
            <div class="icon-date-input" title="START_DATUM">
                <span>🏁</span>
                <input type="date" id="start">
            </div>
            <div class="icon-date-input" title="DEADLINE">
                <span>🎯</span>
                <input type="date" id="end">
            </div>
        </div>
        
        <div class="bottom-row">
            <select id="type">
                <option>CASHBACK</option>
                <option>KORTING</option>
                <option>FREE_ITEM</option>
            </select>
            <button class="save-btn" onclick="add()">DEPLOY</button>
        </div>
    </div>

    <div id="active-list"></div>
</div>

<script>
    let promos = JSON.parse(localStorage.getItem('p_v22')) || [];

    function add() {
        const n = document.getElementById('name').value, s = document.getElementById('start').value, e = document.getElementById('end').value;
        if(!n || !s || !e) { alert('DATA_MISSING'); return; }
        promos.push({ id: Date.now(), name: n, start: s, end: e, type: document.getElementById('type').value });
        save();
        document.getElementById('name').value = '';
        document.getElementById('start').value = '';
        document.getElementById('end').value = '';
    }

    function save() {
        localStorage.setItem('p_v22', JSON.stringify(promos));
        render();
    }

    function render() {
        const container = document.getElementById('active-list');
        const d = new Date();
        const nu = new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
        container.innerHTML = '';

        promos.forEach(p => {
            const d1 = new Date(p.start).getTime(), d2 = new Date(p.end).getTime();
            let pct = 0;
            if (nu >= d1) pct = Math.min(100, Math.floor(((nu - d1) / (d2 - d1)) * 100));
            if (nu > d2) pct = 100;

            let kleur = pct >= 85 ? 'var(--neon-red)' : (pct >= 50 ? '#ffaa00' : 'var(--neon-green)');

            const card = document.createElement('div');
            card.className = 'card';
            card.style.borderLeftColor = kleur;
            card.innerHTML = `
                <div class="del-x" onclick="del(${p.id})">×</div>
                <div class="p-title">${p.name}</div>
                <div class="p-meta">${p.type} | ${pct}%</div>
                <div class="progress-track"><div class="progress-fill" style="width:${pct}%; background:${kleur}"></div></div>
                <div class="date-footer"><span>${p.start}</span><span>${p.end}</span></div>
            `;
            container.appendChild(card);
        });
    }

    function del(id) { promos = promos.filter(x=>x.id!==id); save(); }
    render();
</script>
</body>
</html>
