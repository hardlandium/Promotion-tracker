<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PROMOTION TRACKER</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --bg-dark: #0c0c0c;
            --panel-bg: #151515;
            --accent-red: #ff3131;
            --accent-green: #00ff88;
            --accent-orange: #ffbd00;
            --accent-blue: #00a3ff;
            --border-color: #2a2a2a;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 10px;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
        }

        .dashboard { max-width: 500px; margin: 0 auto; }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--accent-red);
            padding-bottom: 8px;
        }

        .header-left { display: flex; align-items: center; gap: 10px; }
        .logo-box { background: var(--accent-red); color: black; padding: 2px 8px; border-radius: 3px; font-size: 1.2rem; }
        h1 { font-size: 1.1rem; margin: 0; }

        .btn-share-main { background: transparent; border: none; cursor: pointer; padding: 5px; }
        .btn-share-main svg { width: 22px; height: 22px; fill: var(--text-main); }

        .input-section {
            background: var(--panel-bg);
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }

        .form-row { display: flex; gap: 6px; margin-bottom: 8px; }

        input, select {
            background: #1e1e1e;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 900;
            font-style: italic;
            width: 100%;
            text-transform: uppercase;
            box-sizing: border-box;
            height: 40px;
        }

        /* Datum Veld Optimalisatie voor Directe Interactie */
        .calendar-wrapper { position: relative; flex: 1; height: 40px; }
        
        input[type="date"] {
            position: relative;
            appearance: none;
            -webkit-appearance: none;
        }

        /* Fake Placeholder voor Date inputs */
        input[type="date"]::before {
            content: attr(data-placeholder);
            position: absolute;
            left: 10px;
            color: var(--text-dim);
            font-size: 0.7rem;
            pointer-events: none;
        }

        input[type="date"]:focus::before,
        input[type="date"]:valid::before {
            display: none;
        }

        /* Maak de standaard kalender knop onzichtbaar maar klikbaar over het hele veld */
        input[type="date"]::-webkit-calendar-picker-indicator {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            width: auto; height: auto;
            color: transparent;
            background: transparent;
            cursor: pointer;
        }

        .calendar-icon { 
            position: absolute; right: 8px; top: 50%; 
            transform: translateY(-50%); width: 14px; 
            fill: var(--accent-red); pointer-events: none; 
            z-index: 2;
        }

        .btn-save { 
            border: 1px solid var(--accent-green); 
            color: var(--accent-green); 
            background: transparent; 
            padding: 0 15px; 
            cursor: pointer;
            font-weight: 900; 
            font-size: 0.75rem;
            flex: 0.6;
            height: 40px;
        }

        /* Kaarten & Lijsten */
        .promo-card { background: var(--panel-bg); border: 1px solid var(--border-color); padding: 12px; margin-bottom: 10px; border-radius: 4px; }
        .timeline-container { height: 10px; background: #111; margin: 12px 0 4px 0; border-radius: 2px; overflow: hidden; }
        .timeline-bar { height: 100%; background: linear-gradient(90deg, var(--accent-green), #fbff00, var(--accent-red)); transition: width 0.5s ease; }
        .date-labels { display: flex; justify-content: space-between; font-size: 0.6rem; color: var(--text-dim); }

        .btn-action { background: transparent; width: 100%; padding: 10px; font-weight: 900; cursor: pointer; margin-top: 10px; text-transform: uppercase; font-size: 0.75rem; border-radius: 4px; }
        .btn-pos { border: 1px solid var(--accent-red); color: var(--accent-red); }
        .btn-archive { border: 1px solid var(--accent-blue); color: var(--accent-blue); }

        .archive-header { border-bottom: 1px solid var(--accent-blue); color: var(--accent-blue); margin-top: 25px; margin-bottom: 10px; font-size: 0.8rem; opacity: 0.6; }
        .archive-item { background: #0a0a0a; padding: 6px 10px; margin-bottom: 3px; font-size: 0.6rem; display: flex; justify-content: space-between; color: #666; }

        .data-tools-footer { display: flex; justify-content: center; gap: 20px; margin-top: 40px; padding-bottom: 20px; opacity: 0.3; }
        .btn-subtle { background: transparent; border: none; color: #aaa; font-size: 0.55rem; display: flex; align-items: center; gap: 5px; cursor: pointer; font-weight: 900; }
        .btn-subtle svg { width: 12px; height: 12px; fill: currentColor; }
    </style>
</head>
<body>

<div class="dashboard">
    <header>
        <div class="header-left">
            <span class="logo-box">P</span>
            <h1>PROMOTION TRACKER</h1>
        </div>
        <button class="btn-share-main" onclick="shareAsPDF()">
            <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg>
        </button>
    </header>

    <div class="input-section">
        <div class="form-row">
            <input type="text" id="p-name" style="flex: 2;" placeholder="UNIT / ACTIE" required>
            <div class="calendar-wrapper">
                <input type="date" id="p-start" data-placeholder="START" required>
                <svg class="calendar-icon" viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2z"/></svg>
            </div>
            <div class="calendar-wrapper">
                <input type="date" id="p-end" data-placeholder="EINDE" required>
                <svg class="calendar-icon" viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2z"/></svg>
            </div>
        </div>
        <div class="form-row">
            <select id="p-type" style="flex: 2;">
                <option value="CASHBACK">CASHBACK</option>
                <option value="GRATIS PRODUCT">GRATIS PRODUCT</option>
                <option value="KORTING">KORTING</option>
            </select>
            <button class="btn-save" onclick="addPromo()">SAVE</button>
        </div>
    </div>

    <div id="promo-list"></div>

    <div class="archive-header">HISTORY / ARCHIVE</div>
    <div id="archive-list"></div>

    <div class="data-tools-footer">
        <button class="btn-subtle" onclick="exportData()">
            <svg viewBox="0 0 24 24"><path d="M5 4v2h14V4H5zm0 10h4v6h6v-6h4l-7-7-7 7z"/></svg> EXPORT
        </button>
        <button class="btn-subtle" onclick="document.getElementById('importFile').click()">
            <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg> IMPORT
        </button>
        <input type="file" id="importFile" style="display:none" onchange="importData(event)">
    </div>
</div>

<script>
    const { jsPDF } = window.jspdf;
    let promos = JSON.parse(localStorage.getItem('tactical_v15_active')) || [];
    let archive = JSON.parse(localStorage.getItem('tactical_v15_archive')) || [];

    function addPromo() {
        const name = document.getElementById('p-name').value;
        const start = document.getElementById('p-start').value;
        const end = document.getElementById('p-end').value;
        if(!name || !start || !end) return;
        promos.push({ id: Date.now(), name, type: document.getElementById('p-type').value, start, end, posRemoved: false });
        saveAndRender();
        // Reset velden
        document.getElementById('p-name').value = '';
        document.getElementById('p-start').value = '';
        document.getElementById('p-end').value = '';
    }

    async function shareAsPDF() {
        const doc = new jsPDF();
        doc.setFillColor(12, 12, 12); doc.rect(0, 0, 210, 297, 'F');
        doc.setTextColor(255, 49, 49); doc.setFontSize(22); doc.text("PROMOTION TRACKER REPORT", 15, 20);
        doc.setTextColor(255, 255, 255); doc.setFontSize(10);
        let y = 40;
        promos.forEach((p) => {
            doc.setTextColor(0, 255, 136); doc.text(`${p.name} (${p.type})`, 15, y);
            doc.setTextColor(160, 160, 160); doc.text(`Periode: ${p.start} tot ${p.end}`, 15, y + 5);
            y += 15;
        });

        const pdfBlob = doc.output('blob');
        const file = new File([pdfBlob], "promo_report.pdf", { type: "application/pdf" });
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
            await navigator.share({ files: [file], title: 'Promo Export' });
        } else { doc.save("promo_report.pdf"); }
    }

    function calculateProgress(s, e) {
        const now = new Date(); const start = new Date(s); const end = new Date(e);
        if (now < start) return 0; if (now > end) return 100;
        return Math.floor(((now - start) / (end - start)) * 100);
    }

    function saveAndRender() {
        localStorage.setItem('tactical_v15_active', JSON.stringify(promos));
        localStorage.setItem('tactical_v15_archive', JSON.stringify(archive));
        render();
    }

    function render() {
        const container = document.getElementById('promo-list');
        const archiveContainer = document.getElementById('archive-list');
        const today = new Date().toISOString().split('T')[0];
        container.innerHTML = ''; archiveContainer.innerHTML = '';

        promos.forEach(p => {
            const isExpired = p.end < today;
            const progress = calculateProgress(p.start, p.end);
            const card = document.createElement('div');
            card.className = 'promo-card';
            card.style.opacity = p.posRemoved ? "0.4" : "1";
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between">
                    <div><h2 style="margin:0; font-size:1rem;">${p.name}</h2><span style="color:var(--accent-orange); font-size:0.6rem;">${p.type}</span></div>
                    <div style="font-size:0.8rem; color:${isExpired ? 'var(--accent-red)' : 'var(--accent-green)'}">${isExpired ? 'EXP' : 'ACT'}</div>
                </div>
                <div class="timeline-container"><div class="timeline-bar" style="width: ${progress}%"></div></div>
                <div class="date-labels"><span>${p.start}</span><span>${p.end}</span></div>
                ${isExpired && !p.posRemoved ? `<button class="btn-action btn-pos" onclick="markPos(${p.id})">POS VERWIJDERD</button>` : ''}
                ${p.posRemoved ? `<button class="btn-action btn-archive" onclick="moveToArchive(${p.id})">ARCHIVEREN</button>` : ''}
            `;
            container.appendChild(card);
        });

        archive.slice(0, 5).forEach(a => {
            const item = document.createElement('div');
            item.className = 'archive-item';
            item.innerHTML = `<span>${a.name}</span><span>${a.end}</span>`;
            archiveContainer.appendChild(item);
        });
    }

    function exportData() {
        const data = JSON.stringify({ active: promos, archive: archive });
        const blob = new Blob([data], { type: 'application/json' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = "promo_backup.json"; a.click();
    }

    function importData(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const d = JSON.parse(ev.target.result);
            promos = d.active; archive = d.archive; saveAndRender();
        };
        reader.readAsText(e.target.files[0]);
    }

    window.markPos = (id) => { const p = promos.find(x => x.id === id); if(p) p.posRemoved = true; saveAndRender(); };
    window.moveToArchive = (id) => {
        const i = promos.findIndex(x => x.id === id);
        if(i > -1) { archive.unshift(promos[i]); promos.splice(i, 1); saveAndRender(); }
    };

    render();
</script>

</body>
</html>
