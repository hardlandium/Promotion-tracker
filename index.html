<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PROMO TRACKER v18.5</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --bg-dark: #0c0c0c;
            --panel-bg: #151515;
            --accent-red: #ff3131;
            --accent-green: #00ff88;
            --accent-orange: #ffbd00;
            --border-color: #2a2a2a;
            --text-main: #ffffff;
            --text-dim: #666;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 8px;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            overflow-x: hidden;
        }

        .dashboard { width: 100%; max-width: 500px; margin: 0 auto; }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            border-bottom: 2px solid var(--accent-red);
            padding-bottom: 5px;
        }

        .header-left { display: flex; align-items: center; gap: 8px; }
        .logo-box { background: var(--accent-red); color: black; padding: 1px 6px; border-radius: 2px; font-size: 1rem; }
        h1 { font-size: 0.85rem; margin: 0; }

        .header-tools { display: flex; gap: 12px; }
        .tool-btn { background: transparent; border: none; cursor: pointer; display: flex; align-items: center; }
        .tool-btn svg { fill: white; width: 18px; height: 18px; }

        .input-section {
            background: var(--panel-bg);
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
        }

        .input-row { display: flex; gap: 5px; margin-bottom: 5px; }
        .field-group { display: flex; flex-direction: column; flex: 1; }
        .field-label { font-size: 0.5rem; color: var(--accent-red); margin-bottom: 2px; }

        input, select {
            background: #1e1e1e;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 6px;
            border-radius: 3px;
            font-size: 0.7rem;
            font-weight: 900;
            height: 32px;
            width: 100%;
            text-transform: uppercase;
        }

        .btn-save { 
            background: var(--accent-green); 
            color: black; 
            border: none;
            font-weight: 900; 
            height: 32px;
            padding: 0 15px;
            cursor: pointer;
            font-size: 0.7rem;
            border-radius: 3px;
            flex-shrink: 0;
        }

        .promo-card { 
            background: var(--panel-bg); 
            border: 1px solid var(--border-color); 
            padding: 10px; 
            margin-bottom: 8px; 
            border-radius: 4px; 
            position: relative;
        }

        .btn-trash { position: absolute; top: 8px; right: 8px; background: transparent; border: none; font-size: 1rem; color: #444; z-index: 5; cursor: pointer; }

        .timeline-container { 
            height: 14px; 
            background: #000; 
            margin: 12px 0 6px 0; 
            border-radius: 3px; 
            border: 1px solid #222; 
            width: 100%;
            overflow: hidden;
        }
        
        .timeline-bar { 
            height: 100%; 
            display: block;
        }

        .date-labels { display: flex; justify-content: space-between; font-size: 0.6rem; color: var(--text-dim); }

        .btn-action { background: transparent; width: 100%; padding: 10px; font-weight: 900; margin-top: 10px; text-transform: uppercase; font-size: 0.7rem; border-radius: 4px; border: 1px solid transparent; cursor: pointer; }
        .btn-pos { border-color: var(--accent-red); color: var(--accent-red); }
        .btn-archive { border-color: #00a3ff; color: #00a3ff; }

        .archive-header { border-bottom: 1px solid #00a3ff; color: #00a3ff; margin-top: 20px; margin-bottom: 10px; font-size: 0.7rem; opacity: 0.6; }
    </style>
</head>
<body>

<div class="dashboard">
    <header>
        <div class="header-left"><span class="logo-box">P</span><h1>PROMO TRACKER</h1></div>
        <div class="header-tools">
            <button class="tool-btn" onclick="exportData()"><svg viewBox="0 0 24 24"><path d="M12 16c-.55 0-1-.45-1-1V4.41L8.71 6.7c-.39.39-1.02.39-1.41 0-.39-.39-.39-1.02 0-1.41L11.3 1.3c.39-.39 1.02-.39 1.41 0l4 4c.39.39.39 1.02 0 1.41-.39.39-1.02.39-1.41 0L13 4.41V15c0 .55-.45 1-1 1zm9 1c0 .55-.45 1-1 1H4c-.55 0-1-.45-1-1s.45-1 1-1h16c.55 0 1 .45 1 1zm0 4c0 .55-.45 1-1 1H4c-.55 0-1-.45-1-1s.45-1 1-1h16c.55 0 1 .45 1 1z"/></svg></button>
            <button class="tool-btn" onclick="document.getElementById('importFile').click()"><svg viewBox="0 0 24 24"><path d="M11.3 15.7c.39.39 1.02.39 1.41 0l4-4c.39-.39.39-1.02 0-1.41-.39-.39-1.02-.39-1.41 0L13 12.59V2c0-.55-.45-1-1-1s-1 .45-1 1v10.59l-2.29-2.3c-.39-.39-1.02-.39-1.41 0-.39.39-.39 1.02 0 1.41l4 4zM20 18H4c-.55 0-1 .45-1 1s.45 1 1 1h16c.55 0 1-.45 1-1s-.45-1-1-1zm0 4H4c-.55 0-1 .45-1 1s.45 1 1 1h16c.55 0 1-.45 1-1s-.45-1-1-1z"/></svg></button>
            <button class="tool-btn" onclick="sharePDF()"><svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg></button>
        </div>
        <input type="file" id="importFile" style="display:none" onchange="importData(event)">
    </header>

    <div class="input-section">
        <div class="input-row">
            <div class="field-group" style="flex: 3;"><label class="field-label">OMSCHRIJVING</label><input type="text" id="p-name" placeholder="..."></div>
            <div class="field-group" style="flex: 1; align-self: flex-end;"><button class="btn-save" onclick="addPromo()">SAVE</button></div>
        </div>
        <div class="input-row">
            <div class="field-group"><label class="field-label">START</label><input type="date" id="p-start"></div>
            <div class="field-group"><label class="field-label">EINDE</label><input type="date" id="p-end"></div>
            <div class="field-group"><label class="field-label">TYPE</label><select id="p-type"><option>CASHBACK</option><option>GRATIS</option><option>KORTING</option></select></div>
        </div>
    </div>

    <div id="promo-list"></div>
    <div class="archive-header">HISTORY / ARCHIVE</div>
    <div id="archive-list"></div>
</div>

<script>
    const { jsPDF } = window.jspdf;
    let promos = JSON.parse(localStorage.getItem('tact_v17_act')) || [];
    let archive = JSON.parse(localStorage.getItem('tact_v17_arc')) || [];

    function addPromo() {
        const n = document.getElementById('p-name').value, s = document.getElementById('p-start').value, e = document.getElementById('p-end').value;
        if(!n || !s || !e) return;
        promos.push({ id: Date.now(), name: n, type: document.getElementById('p-type').value, start: s, end: e, pos: false });
        save();
        document.getElementById('p-name').value = '';
    }

    function save() {
        localStorage.setItem('tact_v17_act', JSON.stringify(promos));
        localStorage.setItem('tact_v17_arc', JSON.stringify(archive));
        render();
    }

    function render() {
        const container = document.getElementById('promo-list'), archContainer = document.getElementById('archive-list'), d = new Date();
        const todayMs = new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
        container.innerHTML = ''; archContainer.innerHTML = '';

        promos.forEach(p => {
            const sArr = p.start.split('-'), eArr = p.end.split('-');
            const startMs = new Date(sArr[0], sArr[1]-1, sArr[2]).getTime();
            const endMs = new Date(eArr[0], eArr[1]-1, eArr[2]).getTime();
            
            let progress = 0;
            if (todayMs >= startMs) {
                const total = endMs - startMs;
                progress = total > 0 ? Math.min(100, Math.floor(((todayMs - startMs) / total) * 100)) : 100;
            }
            if (todayMs > endMs) progress = 100;
            
            const isExpired = todayMs > endMs;
            let barColor = "#00ff88"; 
            if (progress >= 50) barColor = "#ffbd00"; 
            if (progress >= 85) barColor = "#ff3131"; 

            const card = document.createElement('div');
            card.className = 'promo-card';
            if(p.pos) card.style.opacity = '0.4';
            
            // Balk wordt hier direct met stijl-attributen gegenereerd
            card.innerHTML = `
                <button class="btn-trash" onclick="deletePromo(${p.id})">🗑️</button>
                <div style="display:flex; justify-content:space-between; margin-right: 30px;">
                    <div><div style="font-size:0.9rem;">${p.name}</div><div style="color:#ffbd00; font-size:0.55rem;">${p.type}</div></div>
                    <div style="color:${isExpired ? '#ff3131' : '#00ff88'}; font-size:0.6rem;">${isExpired ? 'EXP' : 'ACT'}</div>
                </div>
                <div class="timeline-container">
                    <div class="timeline-bar" style="width: ${progress}%; background-color: ${barColor};"></div>
                </div>
                <div class="date-labels"><span>${p.start.split('-').reverse().join('/')}</span><span>${p.end.split('-').reverse().join('/')}</span></div>
                ${isExpired && !p.pos ? `<button class="btn-action btn-pos" onclick="markPos(${p.id})">POS VERWIJDERD</button>` : ''}
                ${p.pos ? `<button class="btn-action btn-archive" onclick="moveToArch(${p.id})">ARCHIVEREN</button>` : ''}
            `;
            container.appendChild(card);
        });

        archive.forEach(a => {
            const card = document.createElement('div');
            card.className = 'promo-card archive-card';
            card.style.opacity = '0.5';
            card.innerHTML = `
                <button class="btn-trash" onclick="deletePromo(${a.id}, true)">🗑️</button>
                <div style="display:flex; justify-content:space-between; margin-right: 30px;">
                    <div><div style="font-size:0.85rem; color:#eee;">${a.name}</div><div style="color:#666; font-size:0.55rem;">${a.type}</div></div>
                    <div style="color:#00a3ff; font-size:0.6rem;">ARC</div>
                </div>
                <div class="date-labels" style="margin-top:8px;"><span>${a.start.split('-').reverse().join('/')}</span><span>${a.end.split('-').reverse().join('/')}</span></div>
            `;
            archContainer.appendChild(card);
        });
    }

    function exportData() {
        const blob = new Blob([JSON.stringify({active:promos, archive:archive})], {type:'application/json'});
        const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`promo_backup.json`; a.click();
    }

    function importData(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            try {
                const data = JSON.parse(ev.target.result);
                promos = data.active || []; archive = data.archive || []; save();
            } catch(f) { alert('Fout.'); }
        };
        reader.readAsText(e.target.files[0]);
    }

    function deletePromo(id, isArch=false) {
        if(!confirm('Wissen?')) return;
        if(isArch) archive = archive.filter(x=>x.id!==id); else promos = promos.filter(x=>x.id!==id);
        save();
    }

    window.markPos = (id) => { const p=promos.find(x=>x.id===id); if(p) p.pos=true; save(); };
    window.moveToArch = (id) => {
        const i=promos.findIndex(x=>x.id===id);
        if(i>-1) { archive.unshift(promos[i]); promos.splice(i,1); save(); }
    };

    async function sharePDF() {
        const doc = new jsPDF();
        doc.text("PROMO REPORT", 10, 10);
        promos.forEach((p, i) => doc.text(`${p.name} | ${p.start} - ${p.end}`, 10, 20+(i*10)));
        doc.save("rapport.pdf");
    }

    render();
</script>

</body>
</html>
